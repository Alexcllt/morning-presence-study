<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="Morning Presence — The Global Study on First Impressions">
  <title>Morning Presence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="grain"></div>
  <main id="app">
    <header class="topbar">
      <div class="wordmark">MP / 2026</div>
      <div class="top-actions">
        <span id="progressTop" class="progress-top hidden">01 / 15</span>
        <label class="lang-switch">
          <span id="languageLabel">Langue</span>
          <select id="languageSelect">
            <option value="fr">FR</option>
            <option value="en">EN</option>
            <option value="de">DE</option>
            <option value="es">ES</option>
            <option value="it">IT</option>
          </select>
        </label>
      </div>
    </header>

    <section id="hero" class="screen hero-screen">
      <div class="hero-visual">
        <div class="door"></div>
        <div class="reflection"></div>
        <div class="light-beam"></div>
      </div>
      <div class="hero-copy">
        <p class="eyebrow">GLOBAL RESEARCH · 2026</p>
        <h1 id="title"></h1>
        <p id="subtitle" class="subtitle"></p>
        <p id="heroText" class="hero-text"></p>
        <div class="hero-actions">
          <button id="beginButton" class="text-button"></button>
          <span id="meta" class="meta"></span>
        </div>
        <p id="privacy" class="privacy"></p>
      </div>
    </section>

    <section id="surveyScreen" class="screen survey-screen hidden">
      <aside class="chapter-panel">
        <p id="chapterName" class="eyebrow"></p>
        <p id="chapterLine" class="chapter-line"></p>
        <div class="chapter-art">
          <div class="chapter-orbit"></div>
          <div class="chapter-axis"></div>
        </div>
      </aside>
      <form id="surveyForm" class="question-panel" novalidate>
        <div id="questionWrap" class="question-wrap"></div>
        <div class="navigation">
          <button type="button" id="backButton" class="nav-button nav-secondary"></button>
          <button type="button" id="nextButton" class="nav-button nav-primary"></button>
          <button type="submit" id="submitButton" class="nav-button nav-primary hidden"></button>
        </div>
      </form>
    </section>

    <section id="thanksScreen" class="screen thanks-screen hidden">
      <div class="thanks-copy">
        <p class="eyebrow">MORNING PRESENCE · 2026</p>
        <h2 id="thanksTitle"></h2>
        <p id="thanksText"></p>
        <button id="restartButton" class="text-button"></button>
      </div>
      <div class="thanks-mark">MP</div>
    </section>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
